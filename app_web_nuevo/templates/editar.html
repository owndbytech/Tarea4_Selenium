<!DOCTYPE html>
<html>
<head>
    <title>Editar Pieza</title>
</head>
<body>
    <h1>Editar Pieza</h1>
    <form method="POST">
        <label>Nombre:</label><br>
        <input type="text" name="nombre_pieza" value="{{ pieza.nombre }}" required><br><br>
        <label>Precio:</label><br>
        <input type="number" name="precio_pieza" value="{{ pieza.precio }}" required><br><br>
        <button type="submit">Actualizar</button>
        <a href="/">Cancelar</a>
    </form>
</body>
</html>
