<!DOCTYPE html>
<html>
<head>
    <title>Inventario de Piezas - Axel</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        .btn-eliminar { color: red; }
    </style>
</head>
<body>
    <h1>Gestión de Piezas de Vehículos</h1>
    
    <form action="/agregar" method="POST" style="background: #eee; padding: 20px;">
        <input type="text" name="nombre_pieza" id="nombre" placeholder="Nombre" required>
        <input type="number" name="precio_pieza" id="precio" placeholder="Precio" required>
        <button type="submit" id="btn-guardar">Guardar Pieza</button>
    </form>

    <table>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Acciones</th>
        </tr>
        {% for pieza in piezas %}
        <tr>
            <td>{{ pieza.id }}</td>
            <td>{{ pieza.nombre }}</td>
            <td>{{ pieza.precio }}</td>
            <td>
                <a href="/editar/{{ pieza.id }}">Editar</a> | 
                <a href="/eliminar/{{ pieza.id }}" class="btn-eliminar">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
